spring:
  application:
    name: medical-rag-publisher

medicalai:
  openfda:
    api:
      base-url: ${FDA_API_BASE_URL:https://api.fda.gov}
      drug-ndc-path: ${FDA_API_DRUG_PATH:/drug/ndc.json}
    ingestion:
      enabled: ${FDA_INGESTION_ENABLED:true}
      limit: ${FDA_INGESTION_LIMIT:10}
      skip: ${FDA_INGESTION_SKIP:0}