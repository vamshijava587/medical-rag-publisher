spring:
  application:
    name: medical-rag-publisher

  ai:
    ollama:
      base-url: http://localhost:11434
      embedding:
        model: mxbai-embed-large
    vectorstore:
      qdrant:
        host: fba1bda0-b83d-4360-9856-fc31986894fe.eu-central-1-0.aws.cloud.qdrant.io
        port: 6334
        collection-name: medical-agent-rag
        use-tls: true
        api-key: ${QDRANT_API_KEY}

medicalai:
  openfda:
    api:
      base-url: ${FDA_API_BASE_URL:https://api.fda.gov}
    ingestion:
      enabled: ${FDA_INGESTION_ENABLED:true}
      limit: ${FDA_INGESTION_LIMIT:1}
      skip: ${FDA_INGESTION_SKIP:0}